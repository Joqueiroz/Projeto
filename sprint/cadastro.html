<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <main class="header-home">
            <a href="home.html" class="backhome">Home</a>
      </main>
        <div class="header-container">
            <img src="senailogo.png" alt="Logo do SENAI" />
        </div>
    </header>

    <div class="container">
        <div class="login-box">
            <h2>Cadastre-se</h2>
            <form action="#">
                <label for="name">Nome </label>
                <input type="text" id="name" name="name" placeholder="Digite seu nome completo">

                
                <label for="cpf">CPF</label>
                <input type="text" id="cpf" name="cpf" placeholder="Digite seu CPF">
                
                <label for="password">Email</label>
                <input type="password" id="password" name="password" placeholder="Digite seu email">

                <label for="confirm-password">Senha</label>
                <input type="password" id="confirm-password" name="confirm-password" placeholder="Digite sua senha">
                
                <button type="submit">Cadastrar</button>
                
                <p>Já tem uma conta? <a href="index.html">Faça login aqui</a></p>
            </form>
        </div>
    </div>

    <footer>
        <div class="footer-container">
            <p>Desenvolvido por João Vitor</p>
        </div>
    </footer>
</body>
</html>
